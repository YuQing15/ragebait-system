kind = "web"
previewPath = "/"
title = "Ragebait System UI"
version = "1.0.0"
id = "artifacts/solo-leveling-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18087

[services.development]
run = "pnpm --filter @workspace/solo-leveling-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solo-leveling-ui", "run", "build" ]
publicDir = "artifacts/solo-leveling-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18087"
BASE_PATH = "/"
